# configs/pipeline.yaml
# Single source of truth for all pipeline constants.
# All src/ modules read from here => no hardcode values elsewhere.

detection:
  model: "db_resnet50"
  iou_threshold: 0.5
  assume_straight_pages: true

recognition:
  model: "microsoft/trocr-base-printed"
  max_new_tokens: 32
  confidence_threshold: 0.75   # gate: below this => silent 
  crop_padding: 4              # pixels of padding around each detected box

reading_order:
  row_tolerance: 0.6           # fraction of median box height for row grouping

latency:
  budget_s: 2.0                # hard requirement from Phase 0

tts:
  backend: "local"             # "local" (pyttsx3) | "cloud" (gTTS)
  rate: 150                    # words per minute (pyttsx3 only)
  volume: 1.0                  # 0.0 → 1.0 (pyttsx3 only)
  lang: "en"                   # language code (gTTS only)
